name: Generate Typing SVG

on:
  issues:
    types: [opened, edited]

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: write
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'yarn'

      - name: Install dependencies
        run: yarn --immutable

      - name: Build
        run: yarn build

      - name: Generate SVG
        id: generate
        uses: actions/github-script@v7
        with:
          script: |
            const { generateFromIssue } = require('./dist/index.js');
            await generateFromIssue({ github, context, core });

      - name: Upload SVG artifact
        if: steps.generate.outputs.svg_path
        uses: actions/upload-artifact@v4
        with:
          name: typing-svg
          path: ${{ steps.generate.outputs.svg_path }}

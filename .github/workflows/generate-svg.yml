name: Generate Typing SVG

on:
  issues:
    types: [opened, edited]

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: write
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'yarn'

      - name: Install dependencies
        run: yarn --immutable

      - name: Build
        run: yarn build

      - name: Generate SVG
        id: generate
        uses: actions/github-script@v7
        with:
          script: |
            const { generateFromIssue } = require('./dist/index.js');
            await generateFromIssue({ github, context, core });

      - name: Push to static branch
        if: steps.generate.outputs.svg_path
        run: |
          SVG_PATH="${{ steps.generate.outputs.svg_path }}"
          ISSUE_NUM="${{ github.event.issue.number }}"
          
          # Save SVG to temp location before cleaning
          cp "$GITHUB_WORKSPACE/output/typing-${ISSUE_NUM}.svg" "/tmp/typing-${ISSUE_NUM}.svg"
          
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          # Discard any local changes before switching branches
          git checkout .
          git clean -fd
          
          # Check if static branch exists
          if git ls-remote --exit-code --heads origin static; then
            git fetch origin static
            git checkout static
          else
            git checkout --orphan static
            git rm -rf .
          fi
          
          # Copy SVG from temp and commit
          mkdir -p svg
          cp "/tmp/typing-${ISSUE_NUM}.svg" "svg/typing-${ISSUE_NUM}.svg"
          git add "svg/typing-${ISSUE_NUM}.svg"
          git commit -m "Update typing SVG for issue #${ISSUE_NUM}" || echo "No changes"
          git push origin static

      - name: Comment on issue
        if: steps.generate.outputs.svg_path
        uses: actions/github-script@v7
        with:
          script: |
            const issueNum = context.payload.issue.number;
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const rawUrl = `https://raw.githubusercontent.com/${owner}/${repo}/static/svg/typing-${issueNum}.svg`;
            
            // Delete previous bot comments
            const comments = await github.rest.issues.listComments({
              owner,
              repo,
              issue_number: issueNum
            });
            
            for (const comment of comments.data) {
              if (comment.user?.type === 'Bot') {
                await github.rest.issues.deleteComment({
                  owner,
                  repo,
                  comment_id: comment.id
                });
              }
            }
            
            await github.rest.issues.createComment({
              owner,
              repo,
              issue_number: issueNum,
              body: `## Generated Typing SVG\n\n![Typing SVG](${rawUrl})\n\n**Raw URL:** \`${rawUrl}\``
            });
